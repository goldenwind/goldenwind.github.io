<!doctype html>
<html lang="zh_CN" style="margin: 0 auto;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>在线Markdown编辑器</title>
    <link rel="stylesheet" href="css/editormd.min.css"/>
    <style type="text/css">
        html,body {
            height: 100%;
            overflow: hidden;
            margin: 0;
        }
    </style>
</head>
<body>
    <div id="editor" style="height:100vh;">
    </div>
    <script src="https://cdn.bootcdn.net/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="editormd.min.js"></script>
    <script type="text/javascript">
        $(function () {
            // 实例化编辑器
            var editor = editormd("editor", {
                width: "100%",
                height: "100%",
                // markdown: "xxxx",     // dynamic set Markdown text
                path: "lib/",  // Autoload modules mode, codemirror, marked... dependents libs path
                placeholder: "在线Markdown编辑器",
                autoHeight: false,
                theme: "default",             // Editor.md self themes, before v1.5.0 is CodeMirror theme, default empty (defalut/dark)
                editorTheme: "base16-light",      // Editor area, this is CodeMirror theme at v1.5.0
                previewTheme: "default",             // Preview area theme, default empty (defalut/dark)
                lang : {  // Language data, you can custom your language.
                    name        : "zh-cn",
                    description : "在线Markdown编辑器",
                    tocTitle    : "目录",
                    toolbar     : {
                        //...
                    },
                    button: {
                        //...
                    },
                    dialog : {
                        //...
                    }
                    //...
                }
            });

            // 自动保存
        });
    </script>
</body>
</html>
